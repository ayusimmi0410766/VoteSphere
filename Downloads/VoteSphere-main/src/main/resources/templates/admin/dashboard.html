<!DOCTYPE html>
<html lang="en"
	  xmlns:th="http://www.thymeleaf.org">

<head>

	<meta charset="UTF-8">

	<title>Admin Dashboard</title>

	<meta name="viewport"
		  content="width=device-width, initial-scale=1">

	<!-- BOOTSTRAP -->

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		  rel="stylesheet">

	<!-- CHART JS -->

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<style>

		body{

            background:#0f172a;

            color:white;

            font-family:Arial;

            padding:40px;
        }

        .stats-grid{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(220px,1fr));

            gap:25px;

            margin-top:40px;
        }

        .stats-card{

            background:#1e293b;

            padding:30px;

            border-radius:20px;

            text-align:center;
        }

        .stats-card h2{

            color:#38bdf8;

            font-size:42px;
        }

        .chart-box{

            width:600px;

            height:600px;

            margin:50px auto;

            background:#1e293b;

            padding:30px;

            border-radius:25px;
        }

	</style>

</head>

<body>

<h1 class="text-center">
	Admin Dashboard
</h1>

<div class="stats-grid">

	<div class="stats-card">

		<h3>Candidate 1</h3>

		<h2 th:text="${c1}"></h2>

	</div>

	<div class="stats-card">

		<h3>Candidate 2</h3>

		<h2 th:text="${c2}"></h2>

	</div>

	<div class="stats-card">

		<h3>Candidate 3</h3>

		<h2 th:text="${c3}"></h2>

	</div>

	<div class="stats-card">

		<h3>Candidate 4</h3>

		<h2 th:text="${c4}"></h2>

	</div>

</div>

<!-- PIE CHART -->

<div class="chart-box">

	<canvas id="voteChart"></canvas>

</div>

<script>

	const ctx =
        document.getElementById('voteChart');

    new Chart(ctx, {

        type:'pie',

        data:{

            labels:[

                'Candidate 1',
                'Candidate 2',
                'Candidate 3',
                'Candidate 4'

            ],

            datasets:[{

                data:[

                    [[${c1}]],
                    [[${c2}]],
                    [[${c3}]],
                    [[${c4}]]

                ],

                backgroundColor:[

                    '#6C63FF',
                    '#00C9FF',
                    '#FF6584',
                    '#00E676'

                ]

            }]
        }

    });

</script>

</body>

</html>
