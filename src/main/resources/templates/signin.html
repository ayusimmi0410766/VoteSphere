<!doctype html>
<html lang="en"
	  xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8"/>
	<title>Login</title>
</head>

<body>

<section class="auth-section">

	<div class="auth-card">

		<!-- HEADING -->

		<h1>Welcome Back</h1>

		<p class="subtitle">
			Login securely to continue voting
		</p>

		<!-- SUCCESS MESSAGE -->

		<div th:if="${session.vmsg}" class="message success-msg">

			<th:block th:text="${#session.removeAttribute('vmsg')}"></th:block>

		</div>

		<!-- ERROR MESSAGE -->

		<div th:if="${param.error}" class="message error-msg">

			Invalid username or password

		</div>

		<!-- LOGOUT MESSAGE -->

		<div th:if="${param.logout}" class="message warning-msg">

			Logged out successfully

		</div>

		<!-- LOGIN FORM -->

		<form th:action="@{/dologin}" method="post">

			<div class="input-group-custom">

				<label>Email Address</label>

				<input type="text"
					   name="username"
					   class="form-control"
					   placeholder="Enter your email"
					   required>

			</div>

			<div class="input-group-custom">

				<label>Password</label>

				<input type="password"
					   name="password"
					   class="form-control"
					   placeholder="Enter your password"
					   required>

			</div>

			<button type="submit" class="custom-btn">

				Login

			</button>

		</form>

		<!-- ADMIN DETAILS -->

		<div class="admin-box">

			<h3>Admin Credentials</h3>

			<p>
				<strong>Email:</strong> admin@gmail.com
			</p>

			<p>
				<strong>Password:</strong> admin123
			</p>

		</div>

	</div>

</section>

</body>

</html>
